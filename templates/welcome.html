<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Piknik Vakti — Başla</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  <style>
    .hero{display:flex;flex-direction:column;gap:12px;align-items:center;text-align:center;margin:18px 0}
    .hero h1{margin:6px 0 2px;font-size:24px}
    .hero p{margin:0;color:#9fb2cc}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
    .action{display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;padding:16px;border:1px solid #1c2a40;background:#121a29;border-radius:14px;text-decoration:none;color:#e9f1ff}
    .action:hover{transform:translateY(-2px);opacity:.95}
    .action span{font-weight:700}
    @media(max-width:700px){.grid3{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="navbar navbar mobile">
    <a href="/" class="brand center">
      <img src="{{ url_for('static', filename='icons/picnic-icon-192.png') }}" alt="icon">
      <span>Piknik Vakti</span>
    </a>
  </div>
  <div class="container">
    <div class="hero">
      <h1>Hoş geldin 👋</h1>
      <p>Devam etmek için bir seçenek seç.</p>
    </div>
    <div class="grid3">
      <a class="action" href="/auth/login">
        <span>Giriş Yap</span>
        <small>Hesabınla devam et</small>
      </a>
      <a class="action" href="/auth/register">
        <span>Yeni Kayıt</span>
        <small>Hızlıca hesap oluştur</small>
      </a>
      <a class="action" href="/auth/forgot">
        <span>Şifremi Unuttum</span>
        <small>E‑postana kod gönder</small>
      </a>
    </div>
  </div>
</body>
</html>
